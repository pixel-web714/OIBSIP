<!DOCTYPE html>
<html>
<head>
    <title>Temperature Converter</title>
    <style>
        body {
            font-family: Arial;
            background-color: #E0FFFF;
            text-align: center;
            margin-top: 100px;
            
        }

        .container {
            background: #F0F8FF;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            margin-bottom: 15px;
        }

        input, select, button {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Temperature Converter</h2>

    <input type="text" id="tempInput" placeholder="Enter temperature">

    <select id="unit">
        <option value="C">Celsius</option>
        <option value="F">Fahrenheit</option>
        <option value="K">Kelvin</option>
    </select>

    <button onclick="convertTemp()">Convert</button>

    <div id="result"></div>
</div>

<script>
function convertTemp() {
    let temp = document.getElementById("tempInput").value;
    let unit = document.getElementById("unit").value;
    let result = document.getElementById("result");

    // Validation
    if (temp === "" || isNaN(temp)) {
        result.innerHTML = "❌ Please enter a valid number";
        return;
    }

    temp = parseFloat(temp);
    let output = "";

    if (unit === "C") {
        let f = (temp * 9/5) + 32;
        let k = temp + 273.15;
        output = `${temp} °C = ${f.toFixed(2)} °F | ${k.toFixed(2)} K`;
    }
    else if (unit === "F") {
        let c = (temp - 32) * 5/9;
        let k = c + 273.15;
        output = `${temp} °F = ${c.toFixed(2)} °C | ${k.toFixed(2)} K`;
    }
    else if (unit === "K") {
        let c = temp - 273.15;
        let f = (c * 9/5) + 32;
        output = `${temp} K = ${c.toFixed(2)} °C | ${f.toFixed(2)} °F`;
    }

    result.innerHTML = "---" + output + "---";
}
</script>

</body>
</html>
